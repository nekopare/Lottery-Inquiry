<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>彩票开奖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-icon">★</span>
        <span>彩票开奖</span>
      </div>
      <nav class="nav-tabs" aria-label="彩种导航">
        <button class="nav-tab" data-nav="home">首页</button>
        <button class="nav-tab lottery-switch active" data-type="dlt">大乐透</button>
        <button class="nav-tab lottery-switch" data-type="ssq">双色球</button>
        <button class="nav-tab ai-nav-tab" data-analysis="ai">大模型预测</button>
      </nav>
      <div class="top-actions">
        <a href="#analytics-section" id="top-stats-link">数据统计</a>
        <a href="#history-section">历史记录</a>
      </div>
    </header>

    <main class="dashboard">
      <section class="hero-grid">
        <div class="latest-panel">
          <div id="latest-comparison" class="latest-comparison">
            <div class="loading">最新开奖加载中...</div>
          </div>
        </div>

        <aside class="quick-panel">
          <h2>快捷查询</h2>
          <div class="quick-field">
            <label for="query-issue">按期号查询</label>
            <input type="text" id="query-issue" placeholder="例如 2026058">
          </div>
          <div class="quick-field">
            <label for="query-date">按日期查询</label>
            <input type="date" id="query-date">
          </div>
          <button id="quick-query-btn" class="primary-btn">立即查询</button>
        </aside>
      </section>

      <section class="analytics-panel" id="analytics-section">
        <div class="section-toolbar">
          <div class="analysis-tabs" role="tablist" aria-label="分析类型">
            <button class="analysis-tab active" data-analysis="trend">走势分析</button>
            <button class="analysis-tab" data-analysis="numbers">号码统计</button>
            <button class="analysis-tab" data-analysis="distribution">分布分析</button>
            <button class="analysis-tab" data-analysis="ai">大模型预测</button>
          </div>
          <div class="trend-controls">
            <select id="trend-limit" aria-label="走势图期数">
              <option value="30">近30期</option>
              <option value="50" selected>近50期</option>
              <option value="80">近80期</option>
            </select>
            <div class="segmented">
              <button class="seg-btn active" data-type="dlt">大乐透</button>
              <button class="seg-btn" data-type="ssq">双色球</button>
            </div>
          </div>
        </div>

        <div id="trend-view" class="analysis-view active">
          <div class="chart-title">
            <div>
              <span class="chart-icon">▣</span>
              <strong id="trend-title">大乐透走势</strong>
            </div>
            <div class="legend">
              <span><i class="dot red"></i>前区号码</span>
              <span><i class="dot blue"></i>后区号码</span>
            </div>
          </div>

          <div id="trend-result" class="trend-card">
            <div class="loading">走势图加载中...</div>
          </div>
        </div>

        <div id="numbers-view" class="analysis-view">
          <div class="number-stats-head">
            <div>
              <span class="chart-icon">▣</span>
              <strong id="number-stats-title">大乐透号码统计</strong>
            </div>
            <div class="segmented stat-periods">
              <button class="period-btn active" data-period="10">近10期</button>
              <button class="period-btn" data-period="30">近30期</button>
              <button class="period-btn" data-period="50">近50期</button>
            </div>
          </div>
          <div id="number-stats-result" class="number-stats-page">
            <div class="loading">统计加载中...</div>
          </div>
        </div>

        <div id="distribution-view" class="analysis-view">
          <div class="distribution-head">
            <div>
              <span class="chart-icon">▣</span>
              <strong id="distribution-title">大乐透分布分析</strong>
            </div>
            <button class="export-btn" type="button">导出数据</button>
          </div>
          <div class="distribution-layout">
            <aside class="distribution-menu" aria-label="分布分析类型">
              <button class="active">正态分布</button>
              <button>区间分布</button>
              <button>第一位分布</button>
              <button>第二位分布</button>
              <button>奇偶分布</button>
              <button>大小分布</button>
              <button>质合分布</button>
              <button>重号分布</button>
              <button>连号分布</button>
            </aside>
            <div id="distribution-result" class="distribution-result">
              <div class="loading">分布数据加载中...</div>
            </div>
          </div>
        </div>

        <div id="ai-view" class="analysis-view">
          <div class="ai-workbench">
            <aside class="ai-sidebar" aria-label="历史预测记录">
              <div class="ai-sidebar-head">
                <h3><span class="ai-clock">◷</span>历史预测记录</h3>
                <button id="ai-clear-history" type="button">🗑️ 清空</button>
              </div>
              <div class="ai-sidebar-section">
                <div class="ai-section-label today">今日预测</div>
                <button class="ai-history-item active" type="button" data-history-index="0">
                  <span>
                    <strong>20260609</strong>
                    <em>16:20</em>
                    <small>预测下期大乐透号码走势...</small>
                  </span>
                  <i>›</i>
                </button>
                <button class="ai-history-item" type="button" data-history-index="1">
                  <span>
                    <strong>20260608</strong>
                    <em>15:42</em>
                    <small>帮我分析最近50期的冷号...</small>
                  </span>
                  <i>›</i>
                </button>
                <button class="ai-history-item" type="button" data-history-index="2">
                  <span>
                    <strong>20260607</strong>
                    <em>14:15</em>
                    <small>生成5组大乐透投注方案...</small>
                  </span>
                  <i>›</i>
                </button>
              </div>
              <div class="ai-sidebar-section saved">
                <div class="ai-section-label favorite">⭐ 收藏方案</div>
                <button class="ai-favorite-item" type="button">
                  <span>稳健型方案</span><strong>5组</strong><i>›</i>
                </button>
                <button class="ai-favorite-item" type="button">
                  <span>激进型方案</span><strong>8组</strong><i>›</i>
                </button>
                <button class="ai-favorite-item" type="button">
                  <span>冷热号方案</span><strong>3组</strong><i>›</i>
                </button>
                <button class="ai-favorite-item" type="button">
                  <span>奇偶比方案</span><strong>4组</strong><i>›</i>
                </button>
                <button class="ai-favorite-item" type="button">
                  <span>大小比方案</span><strong>4组</strong><i>›</i>
                </button>
              </div>
            </aside>

            <section class="ai-main" aria-label="大模型预测工作台">
              <div id="ai-chat-scroll" class="ai-chat-scroll">
                <div id="ai-chat-content" class="ai-chat-content"></div>
              </div>
              <form id="ai-input-form" class="ai-input-bar">
                <div class="ai-input-shell">
                  <input id="ai-message-input" type="text" placeholder="输入你的问题..." autocomplete="off">
                  <div class="ai-input-tools left">
                    <button type="button" aria-label="附件">📎</button>
                    <button id="ai-settings-btn" type="button" aria-label="设置">⚙️</button>
                  </div>
                  <div class="ai-input-tools right">
                    <select id="ai-model-select" class="ai-model-select" aria-label="选择对话模型">
                      <option value="deepseek-chat">DeepSeek</option>
                      <option value="claude-sonnet">Claude</option>
                      <option value="gemini-flash">Gemini</option>
                      <option value="gpt-4o">ChatGPT</option>
                      <option value="catgirl">猫娘</option>
                    </select>
                    <button id="ai-send-btn" class="ai-send-btn" type="submit" aria-label="发送">➤</button>
                  </div>
                </div>
              </form>
            </section>
          </div>
        </div>
      </section>

      <section class="stats-grid" id="stats-section">
        <article class="stat-card">
          <div class="card-head">
            <h2>号码热度 TOP10</h2>
            <div class="mini-tabs">
              <button class="active" data-stat-area="front">前区</button>
              <button data-stat-area="back">后区</button>
            </div>
          </div>
          <div id="hot-ranking" class="ranking-list">
            <div class="loading">统计加载中...</div>
          </div>
        </article>

        <article class="stat-card">
          <h2>连出走势</h2>
          <div id="repeat-summary" class="repeat-grid">
            <div class="loading">统计加载中...</div>
          </div>
        </article>

        <article class="stat-card">
          <div class="card-head">
            <h2>遗漏值 TOP10</h2>
            <div class="mini-tabs">
              <button class="active" data-miss-area="front">前区</button>
              <button data-miss-area="back">后区</button>
            </div>
          </div>
          <div id="miss-ranking" class="ranking-list">
            <div class="loading">统计加载中...</div>
          </div>
        </article>
      </section>

      <section class="history-panel" id="history-section">
        <div class="section-toolbar compact">
          <h2>历史查询</h2>
          <div class="history-controls">
            <select id="query-type">
              <option value="date">按日期</option>
              <option value="issue">按期号</option>
              <option value="year">按年份</option>
            </select>
            <div id="date-group">
              <input type="date" id="history-date">
            </div>
            <div id="issue-group" style="display:none;">
              <input type="text" id="history-issue" placeholder="输入期号">
            </div>
            <div id="year-group" style="display:none;">
              <select id="query-year">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
              </select>
            </div>
            <button id="query-btn" class="secondary-btn">查询</button>
          </div>
        </div>
        <div id="history-result" class="history-result"></div>
      </section>

      <section class="history-panel">
        <div class="section-toolbar compact">
          <h2>同日查询</h2>
          <div class="history-controls">
            <input type="date" id="base-date">
            <button id="same-day-btn" class="secondary-btn">查询同日</button>
          </div>
        </div>
        <div id="same-day-result" class="same-day-result"></div>
      </section>
    </main>
  </div>

  <div class="modal" id="detail-modal">
    <div class="modal-content">
      <button class="close-btn" aria-label="关闭">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <div class="modal" id="ai-settings-modal">
    <form class="modal-content ai-settings-content" id="ai-settings-form">
      <button class="close-btn ai-settings-close" type="button" aria-label="关闭">&times;</button>
      <h2>API 设置</h2>
      <p class="ai-settings-note">自带 API Key 仅保存在当前浏览器本地；使用代理转发时，Key 只随本次请求发送，不会在本站保存。</p>

      <div class="ai-settings-grid">
        <label class="ai-setting-field">
          <span>API 模式</span>
          <select id="ai-api-mode">
            <option value="mock">默认 Mock</option>
            <option value="byok">自带 API Key</option>
          </select>
        </label>

        <label class="ai-setting-field">
          <span>服务商</span>
          <select id="ai-provider">
            <option value="deepseek">DeepSeek</option>
            <option value="openai">ChatGPT / OpenAI</option>
            <option value="anthropic">Claude</option>
            <option value="gemini">Gemini</option>
            <option value="custom">自定义 OpenAI 兼容</option>
          </select>
        </label>

        <label class="ai-setting-field wide">
          <span>API URL</span>
          <input id="ai-api-url" type="url" placeholder="https://api.deepseek.com/chat/completions">
        </label>

        <label class="ai-setting-field">
          <span>模型名</span>
          <input id="ai-api-model" type="text" placeholder="deepseek-chat">
        </label>

        <label class="ai-setting-field">
          <span>API Key</span>
          <input id="ai-api-key" type="password" placeholder="sk-...">
        </label>
      </div>

      <div class="ai-settings-actions">
        <button id="ai-clear-settings" class="ghost-btn" type="button">清除配置</button>
        <button class="secondary-btn" type="submit">保存设置</button>
      </div>
    </form>
  </div>

  <script src="app.js"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
